<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tyes — Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="images/tyes-logo-new.svg" rel="shortcut icon" type="image/x-icon">
  <style>
    @font-face{font-family:Gliker;src:url('fonts/gliker-regular.ttf') format("truetype");font-weight:400;font-style:normal;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Montserrat',sans-serif;background:#050505;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .gate{text-align:center;max-width:360px;padding:2rem;}
    .gate img{height:36px;margin-bottom:0.5rem;}
    .gate .brand{font-family:'Gliker',serif;font-size:1.5rem;color:#fff;text-transform:lowercase;margin-bottom:2rem;display:block;}
    .gate p{font-family:'Montserrat',sans-serif;font-weight:500;font-size:0.9rem;color:rgba(255,255,255,0.5);margin-bottom:1.5rem;}
    .gate input{width:100%;padding:0.85rem 1rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:0.9rem;font-weight:500;outline:none;text-align:center;margin-bottom:1rem;}
    .gate input::placeholder{color:rgba(255,255,255,0.3);}
    .gate input:focus{border-color:#58b2ad;}
    .gate button{width:100%;padding:0.85rem;background:#58b2ad;color:#fff;border:none;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;transition:opacity 0.3s;}
    .gate button:hover{opacity:0.85;}
    .gate .error{color:#ef4444;font-size:0.8rem;margin-top:0.75rem;display:none;}
  </style>
</head>
<body>
  <div class="gate">
    <img src="images/tyes-logo-new.svg" alt="tyes">
    <span class="brand">tyes</span>
    <p>This site is under revision.<br>Enter password to continue.</p>
    <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')check()">
    <button onclick="check()">Enter</button>
    <div class="error" id="err">Incorrect password.</div>
  </div>
  <script>
    var H='10a2be0e6b6765b7d4014675cc7fe08e55e423caafbf4a53988ab050eeb4e01e';
    if(sessionStorage.getItem('tyes_auth')==='1')window.location.href='landing.html';
    async function check(){
      var p=document.getElementById('pw').value;
      var b=new TextEncoder().encode(p);
      var h=await crypto.subtle.digest('SHA-256',b);
      var a=Array.from(new Uint8Array(h)).map(function(x){return x.toString(16).padStart(2,'0')}).join('');
      if(a===H){sessionStorage.setItem('tyes_auth','1');window.location.href='landing.html';}
      else{document.getElementById('err').style.display='block';}
    }
  </script>
</body>
</html>
